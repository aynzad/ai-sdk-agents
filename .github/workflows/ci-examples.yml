name: CI Examples

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - run: pnpm install
      - name: Build library and install examples
        run: pnpm examples:install
      - name: Format check
        run: pnpm examples:format

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - run: pnpm install
      - name: Build library and install examples
        run: pnpm examples:install
      - name: Lint
        run: pnpm examples:lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - run: pnpm install
      - name: Build library and install examples
        run: pnpm examples:install
      - name: Type check
        run: pnpm examples:type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - run: pnpm install
      - name: Build library and install examples
        run: pnpm examples:install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Test
        run: pnpm examples:test
